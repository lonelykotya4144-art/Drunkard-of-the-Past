<script> const debug = (msg) => { document.getElementById('debug-log').innerText = "Статус: " + msg; }; 
// --- ГЕНЕРАЦИЯ СТОЛА --- function generateTableDetails() { 
    const table = document.getElementById('table-bg');     for(let i=0; i<12; i++) { 
        const crack = document.createElement('div');         crack.className = 'table-crack';         const w = Math.random() * 200 + 50;         crack.style.width = w + 'px';         crack.style.height = '1px'; 
        crack.style.left = Math.random() * 100 + '%';         crack.style.top = Math.random() * 100 + '%'; 
        crack.style.transform = `rotate(${Math.random() * 360}deg)`;         crack.style.opacity = Math.random() * 0.4;         table.appendChild(crack); 
    } 
    for(let i=0; i<6; i++) { 
        const stain = document.createElement('div');         stain.className = 'table-stain';         const size = Math.random() * 150 + 50;         stain.style.width = size + 'px';         stain.style.height = size * 0.7 + 'px';         stain.style.left = Math.random() * 100 + '%';         stain.style.top = Math.random() * 100 + '%';         table.appendChild(stain); 
    } } 
generateTableDetails();  
// --- ИНТЕРАКТИВ ЧАШКИ --- let cupClicks = 0; const playerCup = document.getElementById('player-cup'); const steamBox = document.getElementById('steam-box'); const enemyCupSecret = document.getElementById('enemy-cup-secret'); const achievement = document.getElementById('achievement'); 
 playerCup.addEventListener('click', () => {     cupClicks++; 
     
    // Эффект вздрагивания     playerCup.classList.add('shaking'); 
    setTimeout(() => playerCup.classList.remove('shaking'), 100); 
     if (cupClicks === 3) {         steamBox.style.display = 'block';         debug("Пошел горячий пар..."); 
    } 
 
if (cupClicks === 6) { 
        enemyCupSecret.style.display = 'block';         achievement.classList.add('show');         debug("Секрет раскрыт: Разлитый кофе"); 
        setTimeout(() => achievement.classList.remove('show'), 4000);     } 
}); 
 
// --- AUDIO ENGINE --- let audioCtx = null; let audioBuffer = null; let audioSource = null; let gainNode = null; let isPlaying = false; let synthNodes = []; 
 async function initAudioContext() {     if (!audioCtx) { 
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();         gainNode = audioCtx.createGain();         gainNode.gain.value = 0.4; 
        gainNode.connect(audioCtx.destination); 
    } 
}  async function playCandleRelightEffect() {     const t = audioCtx.currentTime;     const flame = document.getElementById('candle-flame');     const darkness = document.getElementById('darkness');     const light = document.getElementById('light-fx'); 
     flame.style.opacity = '0';     darkness.style.opacity = '0.85';     light.style.opacity = '0'; 
     const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 
0.5, audioCtx.sampleRate);     const data = noiseBuffer.getChannelData(0); 
    for(let i=0; i<data.length; i++) data[i] = Math.random() * 2 - 1;     const noise = audioCtx.createBufferSource();     noise.buffer = noiseBuffer;     const nGain = audioCtx.createGain();     nGain.gain.setValueAtTime(0.06, t); 
    nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);     noise.connect(nGain); nGain.connect(gainNode);     noise.start(t); 
 
await new Promise(r => setTimeout(r, 2000)); 
     const click = audioCtx.createOscillator();     const cGain = audioCtx.createGain(); 
    click.frequency.setValueAtTime(800, audioCtx.currentTime);     cGain.gain.setValueAtTime(0.1, audioCtx.currentTime);     cGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);     click.connect(cGain); cGain.connect(gainNode);     click.start(); click.stop(audioCtx.currentTime + 0.1); 
     flame.style.opacity = '1';     darkness.style.opacity = '0';     light.style.opacity = '1'; 
 
    await new Promise(r => setTimeout(r, 300)); 
}  function startSyntheticAmbiance() {     if (!audioCtx) return;     stopLoop();     const osc = audioCtx.createOscillator();     const g = audioCtx.createGain();     osc.type = 'triangle';     osc.frequency.setValueAtTime(55, audioCtx.currentTime); 
    g.gain.setValueAtTime(0.04, audioCtx.currentTime);     osc.connect(g); g.connect(gainNode);     osc.start();     synthNodes = [osc, g];     isPlaying = true; 
    document.getElementById('mute-indicator').innerText = '🔥'; }  async function handleFile(file) {     await initAudioContext(); 
    const arrayBuffer = await file.arrayBuffer();     audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);     playLoop(); 
}  async function tryAutoLoad() {     try { 
        const response = await fetch('echoes_of_the_obsidian_hearth.mp3');         if (response.ok) { 
            const blob = await response.blob();             await handleFile(blob); 
        } 
} catch (e) { debug("Загрузите музыку вручную"); } 
}  function playLoop() { 
    if (!audioBuffer) { startSyntheticAmbiance(); return; }     stopLoop(); 
    audioSource = audioCtx.createBufferSource();     audioSource.buffer = audioBuffer;     audioSource.connect(gainNode); 
         audioSource.onended = async () => {         if (isPlaying && audioBuffer) {             await playCandleRelightEffect();             playLoop(); 
        } 
    };      if (audioCtx.state === 'suspended') audioCtx.resume();     audioSource.start(0);     isPlaying = true;     document.getElementById('mute-indicator').innerText = '🔊';     document.getElementById('sound-overlay').style.display = 'none'; }  function stopLoop() { 
    if (audioSource) { audioSource.onended = null; audioSource.stop(); audioSource = null; } 
    synthNodes.forEach(n => { try{n.stop();}catch(e){} });     synthNodes = [];     isPlaying = false; 
    document.getElementById('mute-indicator').innerText = '🔇'; }  document.getElementById('start-btn').onclick = async () => {     await initAudioContext();     await tryAutoLoad();     if (!audioBuffer) { 
        document.getElementById('sound-overlay').style.display = 
'none'; 
    } else playLoop(); 
};  document.getElementById('manual-upload-btn').onclick = () => document.getElementById('audio-file-input').click(); document.getElementById('audio-file-input').onchange = (e) => {     const file = e.target.files[0];     if (file) handleFile(file); 
}; 
 document.getElementById('candle-trigger').onclick = async () => {     await initAudioContext();     if (isPlaying) stopLoop();     else if (audioBuffer) playLoop();     else startSyntheticAmbiance(); 
}; 
 
// --- GAME LOGIC --- 
const SUITS = ['♠', '♣', '♥', '♦']; const VALUES = [ 
    {n:'6',v:6}, {n:'7',v:7}, {n:'8',v:8}, {n:'9',v:9}, {n:'10',v:10}, 
    {n:'B',v:11}, {n:'D',v:12}, {n:'K',v:13}, {n:'T',v:14} 
];  
let decks = { p1: [], p2: [] }; let pot = []; 
let cardsOnTable = { p1: null, p2: null }; let snakesAside = [];  let isProcessing = false; let isAuto = false; let zIdx = 20; 
let huntingFalcons = { p1: false, p2: false }; 
 function showMessage(text, long = false) {     const m = document.getElementById('msg'); 
    m.innerText = text; m.style.opacity = '1'; 
    if (!long) setTimeout(() => m.style.opacity = '0', 1800); }  function init() {     let full = [];     SUITS.forEach(s => { 
        VALUES.forEach(v => full.push({...v, s, type: 'normal'}));         full.push({n:'DR', v:15, s, type:'dragon'});         full.push({n:'C', v:10.5, s, type:'falcon'});         full.push({n:'M', v:1, s, type:'musician'});          full.push({n:'KB', v:13.5, s, type:'queen'});         full.push({n:'SN', v:0, s, type:'snake'}); 
    }); 
    full.sort(() => Math.random() - 0.5); 
    decks.p1 = full.slice(0, Math.floor(full.length/2));     decks.p2 = full.slice(Math.floor(full.length/2));     updateStats(); 
}  function updateStats() { 
    document.getElementById('p1-count').innerText = decks.p1.length;     document.getElementById('p2-count').innerText = decks.p2.length; }  function createCardUI(card, player) {     const el = document.createElement('div');     el.className = `card ${player === 'p1' ? 'pos-p1-deck' : 
'pos-p2-deck'}`;     let bg = '';     let color = (card.s === '♥' || card.s === '♦') ? 'text-red-600' : 
'text-slate-900';     if(card.type === 'dragon') bg = 'bg-dragon';     if(card.type === 'falcon') bg = 'bg-falcon';     if(card.type === 'musician') bg = 'bg-musician';     if(card.type === 'queen') bg = 'bg-queen';     if(card.type === 'snake') bg = 'bg-snake';     const hunterClass = (card.type === 'falcon' && huntingFalcons[player]) ? 'falcon-hunting' : '';     el.innerHTML = ` 
        <div class="card-inner"> 
            <div class="card-face card-back"></div> 
            <div class="card-face card-front ${bg} ${hunterClass}"> 
                <div class="rank-corner top-1 left-2 
${color}">${card.n}</div> 
                <div class="suit-main ${color}">${card.s}</div> 
            </div>         </div>`; 
    document.getElementById('game-field').appendChild(el);     return el; 
}  async function playCard(player) { 
    if (isProcessing || (cardsOnTable[player] && !isProcessing) || decks[player].length === 0) return;     let data = decks[player].shift();      let el = createCardUI(data, player);     zIdx++; el.style.zIndex = zIdx;     if (data.type === 'snake') {         setTimeout(() => {             el.classList.add('flipped');             el.classList.replace(player === 'p1' ? 'pos-p1-deck' : 'pos-p2-deck', player === 'p1' ? 'aside-p1' : 'aside-p2');             snakesAside.push({data, el, player});             showMessage("ЗМЕЯ ГОТОВИТ ЗАПАДНЮ...");             updateStats(); 
            setTimeout(() => playCard(player), 700); 
        }, 50);         return; 
    } 
    setTimeout(() => {         el.classList.add('flipped');         el.classList.replace(player === 'p1' ? 'pos-p1-deck' : 'pos-p2-deck', player === 'p1' ? 'on-table-p1' : 'on-table-p2'); 
    }, 50); 
    cardsOnTable[player] = { data, el };     updateStats(); 
    if (cardsOnTable.p1 && cardsOnTable.p2) resolveDuel();     else if (isAuto) {         const next = player === 'p1' ? 'p2' : 'p1';         setTimeout(() => playCard(next), 600); 
    } 
}  async function resolveDuel() {     isProcessing = true; 
    await new Promise(r => setTimeout(r, 1000));     if (snakesAside.length > 0) {         showMessage("ЗМЕИНЫЙ ОБМЕН!");         await new Promise(r => setTimeout(r, 600));         let temp = cardsOnTable.p1;         cardsOnTable.p1 = cardsOnTable.p2;         cardsOnTable.p2 = temp; 
        cardsOnTable.p1.el.classList.replace('on-table-p2', 
'on-table-p1'); 
        cardsOnTable.p2.el.classList.replace('on-table-p1', 
'on-table-p2'); 
        await new Promise(r => setTimeout(r, 800)); 
    }     let c1 = cardsOnTable.p1.data;     let c2 = cardsOnTable.p2.data; 
     
    const checkWin = (p1Card, p2Card, p1Key, p2Key) => {         if (p1Card.v === p2Card.v && p1Card.type === p2Card.type) return null;         if (p1Card.type === 'musician' && p2Card.n === 'D') return true;         if (p2Card.type === 'musician' && p1Card.n === 'D') return false;         if (p1Card.type === 'musician') return false;         if (p2Card.type === 'musician') return true; 
        if (p1Card.n === 'B' && p2Card.type === 'dragon') return true;         if (p2Card.n === 'B' && p1Card.type === 'dragon') return false;         if (p1Card.type === 'falcon' && huntingFalcons[p1Key] && p2Card.n === 'K') return true; 
        if (p2Card.type === 'falcon' && huntingFalcons[p2Key] && p1Card.n === 'K') return false; 
        if (p1Card.v > p2Card.v) return true;         if (p1Card.v < p2Card.v) return false;         return null; 
    };      let p1WinsResult = checkWin(c1, c2, 'p1', 'p2');     let winner = p1WinsResult === true ? 'p1' : (p1WinsResult === false ? 'p2' : null); 
         if (winner) {         const wCard = cardsOnTable[winner].data;         const lCard = cardsOnTable[winner === 'p1' ? 'p2' : 
'p1'].data; 
        if (wCard.type === 'falcon' && lCard.n === 'B') { huntingFalcons[winner] = true; showMessage("СОКОЛ ВЫШЕЛ НА ОХОТУ!"); }         else if (wCard.type === 'falcon' && huntingFalcons[winner] && lCard.n === 'K') { huntingFalcons[winner] = false; showMessage("СОКОЛ СЫТ"); } 
        if (c1.type === 'falcon' && winner === 'p2') huntingFalcons.p1 
= false; 
        if (c2.type === 'falcon' && winner === 'p1') huntingFalcons.p2 
= false; 
        const targetY = winner === 'p1' ? 1200 : -1200;         let collect = [...pot, cardsOnTable.p1, cardsOnTable.p2, 
...snakesAside]; 
        collect.forEach(p => { 
            p.el.style.transform = `translate(-50%, ${targetY}px) rotate(${Math.random()*40-20}deg)`; 
            p.el.style.opacity = "0";             decks[winner].push(p.data); 
        }); 
        finalizeRound(collect); 
    } else { 
        showMessage("СПОР!"); 
        pot.push(cardsOnTable.p1, cardsOnTable.p2, ...snakesAside);         cardsOnTable = { p1: null, p2: null };         snakesAside = [];         isProcessing = false; 
        if (isAuto) setTimeout(() => playCard('p1'), 600); 
    } 
function finalizeRound(toRemove) {
    setTimeout(() => {
        toRemove.forEach(p => p.el.remove());
        pot = []; snakesAside = [];
        cardsOnTable = { p1: null, p2: null };

    }, 600);
}

function isGameOver() { return decks.p1.length === 0 || decks.p2.length === 0; }
function checkGameOver() {
    if (decks.p1.length === 0) { showMessage("ВЫ ПРОИГРАЛИ...", true); setTimeout(() => location.reload(), 3000); }
    else if (decks.p2.length === 0) { showMessage("ВЫ ПОБЕДИТЕЛЬ!", true); setTimeout(() => location.reload(), 3000); }
}

document.getElementById('p1-btn').onclick = () => playCard('p1');
document.getElementById('p2-btn').onclick = () => playCard('p2');
