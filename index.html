<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пьяница: Мастера Карт — Охота Сокола</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root { --table-brown: #1a0f0a; }
body {
background: #050302;
height: 100vh; overflow: hidden; font-family: 'Georgia', serif; color: #fef3c7; margin: 0;
user-select: none;
}
    /* --- ДЕТАЛИЗИРОВАННЫЙ СТОЛ --- */
    .wood-table {
        position: fixed; inset: 0;
        background: radial-gradient(circle at 50% 50%, rgba(80, 50, 40, 0.2) 0%, rgba(0,0,0,0.9) 100%),
                    repeating-linear-gradient(90deg, #120a07 0px, #120a07 100px, #1a0f0a 101px, #1a0f0a 200px);
        z-index: 0;
    }
    .table-crack { position: absolute; background: rgba(0,0,0,0.4); pointer-events: none; }
    .table-stain { position: absolute; background: rgba(40, 20, 10, 0.3); border-radius: 50%; filter: blur(15px); pointer-events: none; }

    /* --- ДЕКОР --- */
    .candle-container { position: absolute; bottom: 80px; left: 8%; z-index: 60; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: opacity 0.3s; }
    .candle-body { width: 24px; height: 100px; background: linear-gradient(to right, #e9c46a, #f4a261, #e9c46a); border-radius: 4px; box-shadow: inset -2px 0 5px rgba(0,0,0,0.3); }
    .flame-wrapper { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); filter: blur(1px); animation: flicker 0.15s infinite alternate; }
    .flame-outer { width: 16px; height: 28px; background: #ff7b00; border-radius: 50% 50% 20% 20%; box-shadow: 0 0 30px #ff7b00; opacity: 0.9; }
    .flame-inner { position: absolute; top: 8px; left: 3px; width: 10px; height: 18px; background: #ffcc00; border-radius: 50% 50% 20% 20%; }
    
    .candle-light-overlay {
        position: absolute; inset: 0;
        background: radial-gradient(circle at 15% 85%, rgba(255, 123, 0, 0.15) 0%, transparent 60%);
        pointer-events: none; z-index: 5; animation: light-flicker 0.2s infinite alternate;
        transition: opacity 0.5s;
    }

    .darkness-overlay { position: fixed; inset: 0; background: black; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.5s; }

    /* --- ИНТЕРАКТИВНАЯ ЧАШКА --- */
    .cup-player { 
        position: absolute; bottom: 80px; right: 10%; width: 60px; height: 45px; 
        background: #2d1b0d; border-radius: 0 0 20px 20px; z-index: 60; 
        box-shadow: inset 0 -5px 10px rgba(0,0,0,0.5); cursor: pointer;
        transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .cup-player.shaking { transform: scale(1.05) rotate(5deg); }
    .cup-handle { position: absolute; right: -12px; top: 10px; width: 15px; height: 20px; border: 5px solid #2d1b0d; border-radius: 50%; }
    .steam-container { position: absolute; top: -30px; left: 0; width: 100%; height: 30px; pointer-events: none; display: none; }
    .steam-particle { position: absolute; bottom: 0; left: 50%; width: 12px; height: 12px; background: rgba(255,255,255,0.15); border-radius: 50%; filter: blur(6px); animation: steam-rise 3s infinite ease-out; opacity: 0; }

    /* Разлитый кофе врага */
    .spilled-coffee { 
        position: absolute; top: 100px; right: 15%; width: 70px; height: 30px; 
        z-index: 40; display: none; transform: rotate(160deg);
    }
    .cup-enemy { width: 50px; height: 35px; background: #2d1b0d; border-radius: 20px 20px 0 0; position: relative; }
    .coffee-stain { position: absolute; top: 20px; left: -20px; width: 80px; height: 40px; background: rgba(30, 15, 5, 0.8); border-radius: 50%; filter: blur(8px); z-index: -1; }

    /* Ачивка */
    #achievement {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150%);
        background: rgba(45, 27, 13, 0.95); border: 2px solid #e9c46a; color: #fef3c7;
        padding: 15px 30px; border-radius: 8px; z-index: 3000; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        display: flex; align-items: center; gap: 15px; transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    #achievement.show { transform: translateX(-50%) translateY(0); }
    .ach-icon { font-size: 2rem; color: #e9c46a; }

    /* --- КОСТИ --- */
    .dice-container { position: absolute; top: 120px; left: 18%; z-index: 40; display: flex; gap: 15px; opacity: 0.6; transform: rotate(-10deg); filter: sepia(0.5); }
    .dice { width: 32px; height: 32px; background: #dcd7c9; border-radius: 5px; position: relative; box-shadow: 2px 4px 6px rgba(0,0,0,0.6); animation: dice-jitter 6s infinite; border: 1px solid rgba(0,0,0,0.2); }
    .dice-dot { position: absolute; width: 6px; height: 6px; background: #222; border-radius: 50%; }
    .d1 .p1 { top: 6px; left: 6px; } .d1 .p2 { top: 6px; right: 6px; } .d1 .p3 { bottom: 6px; left: 6px; } .d1 .p4 { bottom: 6px; right: 6px; }
    .d2 .p1 { top: 50%; left: 50%; transform: translate(-50%, -50%); }

    @keyframes dice-jitter { 0%, 94%, 100% { transform: translate(0,0) rotate(0); } 96% { transform: translate(1px, -1px) rotate(3deg); } 98% { transform: translate(-1px, 1px) rotate(-3deg); } }
    @keyframes flicker { 0% { transform: translateX(-50%) scale(1); } 100% { transform: translateX(-52%) scale(1.1) skewX(2deg); } }
    @keyframes light-flicker { 0% { opacity: 0.7; } 100% { opacity: 1; } }
    @keyframes steam-rise { 0% { transform: translate(-50%, 0) scale(1); opacity: 0; } 50% { opacity: 0.25; } 100% { transform: translate(-120%, -80px) scale(3); opacity: 0; } }

    /* --- КАРТЫ --- */
    .card { width: 110px; height: 160px; border-radius: 8px; position: absolute; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
    .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(0,0,0,0.5); box-shadow: 0 5px 15px rgba(0,0,0,0.6); }
    .card-back { background: #4a3427; background-image: repeating-linear-gradient(45deg, #3d2b20 0px, #3d2b20 10px, #4a3427 10px, #4a3427 20px); }
    .card-front { background: #fdfae5; color: #1a1c2c; transform: rotateY(180deg); }
    
    .bg-dragon { background: #9b2226 !important; color: white !important; }
    .bg-falcon { background: #005f73 !important; color: white !important; }
    .bg-musician { background: #ff85a1 !important; color: #1a0f0a !important; }
    .bg-queen { background: #5a189a !important; color: white !important; }
    .bg-snake { background: #1b4332 !important; color: #d8f3dc !important; }
    
    .falcon-hunting { border: 4px solid #facc15 !important; box-shadow: 0 0 20px #facc15 !important; }
    .suit-main { font-size: 2.8rem; }
    .rank-corner { font-size: 1rem; font-weight: 900; position: absolute; }
    
    .pos-p2-deck { top: -200px; left: 50%; transform: translateX(-50%); }
    .pos-p1-deck { bottom: -200px; left: 50%; transform: translateX(-50%); }
    .on-table-p2 { top: calc(50% - 190px); left: 50%; transform: translateX(-50%) rotate(2deg); }
    .on-table-p1 { bottom: calc(50% - 190px); left: 50%; transform: translateX(-50%) rotate(-2deg); }
    
    .aside-p1 { bottom: 50%; left: 8%; transform: translateY(50%) rotate(-10deg); }
    .aside-p2 { top: 50%; left: 8%; transform: translateY(-50%) rotate(10deg); }

    .action-btn { pointer-events: auto; background: #3e2723; color: #d7ccc8; padding: 10px 18px; border-radius: 4px; border: 1px solid #1a0f0a; box-shadow: 0 4px 0 #000; text-transform: uppercase; font-size: 0.75rem; transition: 0.1s; cursor: pointer; }
    .action-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
    .stats { background: rgba(0,0,0,0.9); padding: 5px 12px; border-radius: 4px; border: 1px solid #2d1b0d; font-size: 0.9rem; }
    
    #msg { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #ffca28; font-size: 2.2rem; font-weight: bold; text-shadow: 2px 2px 8px #000; pointer-events: none; opacity: 0; z-index: 1000; text-align: center; width: 90%; transition: opacity 0.3s; }
    .mute-btn { position: fixed; top: 20px; right: 20px; z-index: 500; font-size: 1.5rem; cursor: pointer; opacity: 0.6; }
    
    #sound-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    #debug-log { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: #555; pointer-events: none; max-width: 80%; }
    .hidden-input { display: none; }
</style>

</head>
<body>
<div class="wood-table" id="table-bg"></div>
<div class="darkness-overlay" id="darkness"></div>
<div class="candle-light-overlay" id="light-fx"></div>
<!-- Ачивка -->
<div id="achievement">
<div class="ach-icon">☕</div>
<div>
<div class="text-xs uppercase tracking-widest text-amber-500 font-bold">Достижение получено</div>
<div class="text-lg font-bold">Разлитый кофе</div>
</div>
</div>
<div id="sound-overlay">
<div class="mb-8 text-center px-4">
<h2 class="text-3xl font-bold mb-2 text-amber-200">Echoes of the Obsidian Hearth</h2>
<p class="text-amber-500/80 italic text-sm">Таверна шепчет твоё имя...</p>
</div>
<div class="flex flex-col gap-4">
<button id="start-btn" class="action-btn px-12 py-6 text-xl tracking-widest bg-amber-900/40">ВОЙТИ</button>
<button id="manual-upload-btn" class="text-xs text-amber-700 underline opacity-50 hover:opacity-100">Загрузить музыку вручную</button>
</div>
<input type="file" id="audio-file-input" class="hidden-input" accept="audio/*">
</div>
<div id="mute-indicator" class="mute-btn">🔇</div>
<div class="candle-container" id="candle-trigger">
<div class="flame-wrapper" id="candle-flame"><div class="flame-outer"></div><div class="flame-inner"></div></div>
<div class="candle-body"></div>
</div>
<div class="dice-container">
<div class="dice d1"><div class="dice-dot p1"></div><div class="dice-dot p2"></div><div class="dice-dot p3"></div><div class="dice-dot p4"></div></div>
<div class="dice d2" style="animation-delay: 1.2s; transform: rotate(15deg);"><div class="dice-dot p1"></div></div>
</div>
<!-- Чашка противника (секрет) -->
<div class="spilled-coffee" id="enemy-cup-secret">
<div class="coffee-stain"></div>
<div class="cup-enemy"></div>
</div>
<!-- Твоя чашка -->
<div class="cup-player" id="player-cup">
<div class="cup-handle"></div>
<div class="steam-container" id="steam-box">
<div class="steam-particle" style="animation-delay: 0s"></div>
<div class="steam-particle" style="animation-delay: 1.5s; left: 20%"></div>
<div class="steam-particle" style="animation-delay: 0.8s; left: 80%"></div>
<div class="steam-particle" style="animation-delay: 2.2s; left: 40%"></div>
</div>
</div>
<div id="msg"></div>
<div id="debug-log">Ожидание...</div>
<div class="fixed top-5 left-5 z-[300] flex gap-2">
<button id="auto-btn" class="action-btn" style="background: #1b263b;">АВТО: ВЫКЛ</button>
</div>
<div class="fixed inset-0 pointer-events-none flex flex-col justify-between p-10 z-[200]">
<div class="flex flex-col items-center gap-3">
<div class="stats text-red-400">Враг: <span id="p2-count">?</span></div>
<button id="p2-btn" class="action-btn">Ход врага</button>
</div>
<div class="flex flex-col items-center gap-3">
<button id="p1-btn" class="action-btn">Твой ход</button>
<div class="stats text-green-400">Ты: <span id="p1-count">?</span></div>
</div>
</div>
<div id="game-field" class="relative w-full h-full"></div>
<script>
const debug = (msg) => { document.getElementById('debug-log').innerText = "Статус: " + msg; };
// --- ГЕНЕРАЦИЯ СТОЛА ---
function generateTableDetails() {
    const table = document.getElementById(&#39;table-bg&#39;);
    for(let i=0; i&lt;12; i++) {
        const crack = document.createElement(&#39;div&#39;);
        crack.className = &#39;table-crack&#39;;
        const w = Math.random() * 200 + 50;
        crack.style.width = w + &#39;px&#39;;
        crack.style.height = &#39;1px&#39;;
        crack.style.left = Math.random() * 100 + &#39;%&#39;;
        crack.style.top = Math.random() * 100 + &#39;%&#39;;
        crack.style.transform = `rotate(${Math.random() * 360}deg)`;
        crack.style.opacity = Math.random() * 0.4;
        table.appendChild(crack);
    }
    for(let i=0; i&lt;6; i++) {
        const stain = document.createElement(&#39;div&#39;);
        stain.className = &#39;table-stain&#39;;
        const size = Math.random() * 150 + 50;
        stain.style.width = size + &#39;px&#39;;
        stain.style.height = size * 0.7 + &#39;px&#39;;
        stain.style.left = Math.random() * 100 + &#39;%&#39;;
        stain.style.top = Math.random() * 100 + &#39;%&#39;;
        table.appendChild(stain);
    }
}
generateTableDetails();

// --- ИНТЕРАКТВ ЧАШКИ ---
let cupClicks = 0;
const playerCup = document.getElementById(&#39;player-cup&#39;);
const steamBox = document.getElementById(&#39;steam-box&#39;);
const enemyCupSecret = document.getElementById(&#39;enemy-cup-secret&#39;);
const achievement = document.getElementById(&#39;achievement&#39;);

playerCup.addEventListener(&#39;click&#39;, () =&gt; {
    cupClicks++;
    
    // Эффект вздрагивания
    playerCup.classList.add(&#39;shaking&#39;);
    setTimeout(() =&gt; playerCup.classList.remove(&#39;shaking&#39;), 100);

    if (cupClicks === 3) {
        steamBox.style.display = &#39;block&#39;;
        debug(&quot;Пошел горячий пар...&quot;);
    }

    if (cupClicks === 6) {
        enemyCupSecret.style.display = &#39;block&#39;;
        achievement.classList.add(&#39;show&#39;);
        debug(&quot;Секрет раскрыт: Разлитый кофе&quot;);
        setTimeout(() =&gt; achievement.classList.remove(&#39;show&#39;), 4000);
    }
});

// --- AUDIO ENGINE ---
let audioCtx = null;
let audioBuffer = null;
let audioSource = null;
let gainNode = null;
let isPlaying = false;
let synthNodes = [];

async function initAudioContext() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 0.4;
        gainNode.connect(audioCtx.destination);
    }
}

async function playCandleRelightEffect() {
    const t = audioCtx.currentTime;
    const flame = document.getElementById(&#39;candle-flame&#39;);
    const darkness = document.getElementById(&#39;darkness&#39;);
    const light = document.getElementById(&#39;light-fx&#39;);

    flame.style.opacity = &#39;0&#39;;
    darkness.style.opacity = &#39;0.85&#39;;
    light.style.opacity = &#39;0&#39;;

    const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for(let i=0; i&lt;data.length; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = noiseBuffer;
    const nGain = audioCtx.createGain();
    nGain.gain.setValueAtTime(0.06, t);
    nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    noise.connect(nGain); nGain.connect(gainNode);
    noise.start(t);

    await new Promise(r =&gt; setTimeout(r, 2000));

    const click = audioCtx.createOscillator();
    const cGain = audioCtx.createGain();
    click.frequency.setValueAtTime(800, audioCtx.currentTime);
    cGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    cGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    click.connect(cGain); cGain.connect(gainNode);
    click.start(); click.stop(audioCtx.currentTime + 0.1);

    flame.style.opacity = &#39;1&#39;;
    darkness.style.opacity = &#39;0&#39;;
    light.style.opacity = &#39;1&#39;;

    await new Promise(r =&gt; setTimeout(r, 300));
}

function startSyntheticAmbiance() {
    if (!audioCtx) return;
    stopLoop();
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = &#39;triangle&#39;;
    osc.frequency.setValueAtTime(55, audioCtx.currentTime);
    g.gain.setValueAtTime(0.04, audioCtx.currentTime);
    osc.connect(g); g.connect(gainNode);
    osc.start();
    synthNodes = [osc, g];
    isPlaying = true;
    document.getElementById(&#39;mute-indicator&#39;).innerText = &#39;🔥&#39;;
}

async function handleFile(file) {
    await initAudioContext();
    const arrayBuffer = await file.arrayBuffer();
    audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    playLoop();
}

async function tryAutoLoad() {
    try {
        const response = await fetch(&#39;echoes_of_the_obsidian_hearth.mp3&#39;);
        if (response.ok) {
            const blob = await response.blob();
            await handleFile(blob);
        }
    } catch (e) { debug(&quot;Загрузите музыку вручную&quot;); }
}

function playLoop() {
    if (!audioBuffer) { startSyntheticAmbiance(); return; }
    stopLoop();
    audioSource = audioCtx.createBufferSource();
    audioSource.buffer = audioBuffer;
    audioSource.connect(gainNode);
    
    audioSource.onended = async () =&gt; {
        if (isPlaying &amp;&amp; audioBuffer) {
            await playCandleRelightEffect();
            playLoop();
        }
    };

    if (audioCtx.state === &#39;suspended&#39;) audioCtx.resume();
    audioSource.start(0);
    isPlaying = true;
    document.getElementById(&#39;mute-indicator&#39;).innerText = &#39;🔊&#39;;
    document.getElementById(&#39;sound-overlay&#39;).style.display = &#39;none&#39;;
}

function stopLoop() {
    if (audioSource) { audioSource.onended = null; audioSource.stop(); audioSource = null; }
    synthNodes.forEach(n =&gt; { try{n.stop();}catch(e){} });
    synthNodes = [];
    isPlaying = false;
    document.getElementById(&#39;mute-indicator&#39;).innerText = &#39;🔇&#39;;
}

document.getElementById(&#39;start-btn&#39;).onclick = async () =&gt; {
    await initAudioContext();
    await tryAutoLoad();
    if (!audioBuffer) {
        document.getElementById(&#39;sound-overlay&#39;).style.display = &#39;none&#39;;
    } else playLoop();
};

document.getElementById(&#39;manual-upload-btn&#39;).onclick = () =&gt; document.getElementById(&#39;audio-file-input&#39;).click();
document.getElementById(&#39;audio-file-input&#39;).onchange = (e) =&gt; {
    const file = e.target.files[0];
    if (file) handleFile(file);
};

document.getElementById(&#39;candle-trigger&#39;).onclick = async () =&gt; {
    await initAudioContext();
    if (isPlaying) stopLoop();
    else if (audioBuffer) playLoop();
    else startSyntheticAmbiance();
};

// --- GAME LOGIC ---
const SUITS = [&#39;♠&#39;, &#39;♣&#39;, &#39;♥&#39;, &#39;♦&#39;];
const VALUES = [
    {n:&#39;6&#39;,v:6}, {n:&#39;7&#39;,v:7}, {n:&#39;8&#39;,v:8}, {n:&#39;9&#39;,v:9}, {n:&#39;10&#39;,v:10},
    {n:&#39;B&#39;,v:11}, {n:&#39;D&#39;,v:12}, {n:&#39;K&#39;,v:13}, {n:&#39;T&#39;,v:14}
];

let decks = { p1: [], p2: [] };
let pot = [];
let cardsOnTable = { p1: null, p2: null };
let snakesAside = []; 
let isProcessing = false;
let isAuto = false;
let zIdx = 20;
let huntingFalcons = { p1: false, p2: false };

function showMessage(text, long = false) {
    const m = document.getElementById(&#39;msg&#39;);
    m.innerText = text; m.style.opacity = &#39;1&#39;;
    if (!long) setTimeout(() =&gt; m.style.opacity = &#39;0&#39;, 1800);
}

function init() {
    let full = [];
    SUITS.forEach(s =&gt; {
        VALUES.forEach(v =&gt; full.push({...v, s, type: &#39;normal&#39;}));
        full.push({n:&#39;DR&#39;, v:15, s, type:&#39;dragon&#39;});
        full.push({n:&#39;C&#39;, v:10.5, s, type:&#39;falcon&#39;});
        full.push({n:&#39;M&#39;, v:1, s, type:&#39;musician&#39;}); 
        full.push({n:&#39;KB&#39;, v:13.5, s, type:&#39;queen&#39;});
        full.push({n:&#39;SN&#39;, v:0, s, type:&#39;snake&#39;});
    });
    full.sort(() =&gt; Math.random() - 0.5);
    decks.p1 = full.slice(0, Math.floor(full.length/2));
    decks.p2 = full.slice(Math.floor(full.length/2));
    updateStats();
}

function updateStats() {
    document.getElementById(&#39;p1-count&#39;).innerText = decks.p1.length;
    document.getElementById(&#39;p2-count&#39;).innerText = decks.p2.length;
}

function createCardUI(card, player) {
    const el = document.createElement(&#39;div&#39;);
    el.className = `card ${player === &#39;p1&#39; ? &#39;pos-p1-deck&#39; : &#39;pos-p2-deck&#39;}`;
    let bg = &#39;&#39;;
    let color = (card.s === &#39;♥&#39; || card.s === &#39;♦&#39;) ? &#39;text-red-600&#39; : &#39;text-slate-900&#39;;
    if(card.type === &#39;dragon&#39;) bg = &#39;bg-dragon&#39;;
    if(card.type === &#39;falcon&#39;) bg = &#39;bg-falcon&#39;;
    if(card.type === &#39;musician&#39;) bg = &#39;bg-musician&#39;;
    if(card.type === &#39;queen&#39;) bg = &#39;bg-queen&#39;;
    if(card.type === &#39;snake&#39;) bg = &#39;bg-snake&#39;;
    const hunterClass = (card.type === &#39;falcon&#39; &amp;&amp; huntingFalcons[player]) ? &#39;falcon-hunting&#39; : &#39;&#39;;
    el.innerHTML = `
        &lt;div class=&quot;card-inner&quot;&gt;
            &lt;div class=&quot;card-face card-back&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;card-face card-front ${bg} ${hunterClass}&quot;&gt;
                &lt;div class=&quot;rank-corner top-1 left-2 ${color}&quot;&gt;${card.n}&lt;/div&gt;
                &lt;div class=&quot;suit-main ${color}&quot;&gt;${card.s}&lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;`;
    document.getElementById(&#39;game-field&#39;).appendChild(el);
    return el;
}

async function playCard(player) {
    if (isProcessing || (cardsOnTable[player] &amp;&amp; !isProcessing) || decks[player].length === 0) return;
    let data = decks[player].shift(); 
    let el = createCardUI(data, player);
    zIdx++; el.style.zIndex = zIdx;
    if (data.type === &#39;snake&#39;) {
        setTimeout(() =&gt; {
            el.classList.add(&#39;flipped&#39;);
            el.classList.replace(player === &#39;p1&#39; ? &#39;pos-p1-deck&#39; : &#39;pos-p2-deck&#39;, player === &#39;p1&#39; ? &#39;aside-p1&#39; : &#39;aside-p2&#39;);
            snakesAside.push({data, el, player});
            showMessage(&quot;ЗМЕЯ ГОТОВИТ ЗАПАДНЮ...&quot;);
            updateStats();
            setTimeout(() =&gt; playCard(player), 700);
        }, 50);
        return;
    }
    setTimeout(() =&gt; {
        el.classList.add(&#39;flipped&#39;);
        el.classList.replace(player === &#39;p1&#39; ? &#39;pos-p1-deck&#39; : &#39;pos-p2-deck&#39;, player === &#39;p1&#39; ? &#39;on-table-p1&#39; : &#39;on-table-p2&#39;);
    }, 50);
    cardsOnTable[player] = { data, el };
    updateStats();
    if (cardsOnTable.p1 &amp;&amp; cardsOnTable.p2) resolveDuel();
    else if (isAuto) {
        const next = player === &#39;p1&#39; ? &#39;p2&#39; : &#39;p1&#39;;
        setTimeout(() =&gt; playCard(next), 600);
    }
}

async function resolveDuel() {
    isProcessing = true;
    await new Promise(r =&gt; setTimeout(r, 1000));
    if (snakesAside.length &gt; 0) {
        showMessage(&quot;ЗМЕИНЫЙ ОБМЕН!&quot;);
        await new Promise(r =&gt; setTimeout(r, 600));
        let temp = cardsOnTable.p1;
        cardsOnTable.p1 = cardsOnTable.p2;
        cardsOnTable.p2 = temp;
        cardsOnTable.p1.el.classList.replace(&#39;on-table-p2&#39;, &#39;on-table-p1&#39;);
        cardsOnTable.p2.el.classList.replace(&#39;on-table-p1&#39;, &#39;on-table-p2&#39;);
        await new Promise(r =&gt; setTimeout(r, 800));
    }
    let c1 = cardsOnTable.p1.data;
    let c2 = cardsOnTable.p2.data;
    
    const checkWin = (p1Card, p2Card, p1Key, p2Key) =&gt; {
        if (p1Card.v === p2Card.v &amp;&amp; p1Card.type === p2Card.type) return null;
        if (p1Card.type === &#39;musician&#39; &amp;&amp; p2Card.n === &#39;D&#39;) return true;
        if (p2Card.type === &#39;musician&#39; &amp;&amp; p1Card.n === &#39;D&#39;) return false;
        if (p1Card.type === &#39;musician&#39;) return false;
        if (p2Card.type === &#39;musician&#39;) return true;
        if (p1Card.n === &#39;B&#39; &amp;&amp; p2Card.type === &#39;dragon&#39;) return true;
        if (p2Card.n === &#39;B&#39; &amp;&amp; p1Card.type === &#39;dragon&#39;) return false;
        if (p1Card.type === &#39;falcon&#39; &amp;&amp; huntingFalcons[p1Key] &amp;&amp; p2Card.n === &#39;K&#39;) return true;
        if (p2Card.type === &#39;falcon&#39; &amp;&amp; huntingFalcons[p2Key] &amp;&amp; p1Card.n === &#39;K&#39;) return false;
        if (p1Card.v &gt; p2Card.v) return true;
        if (p1Card.v &lt; p2Card.v) return false;
        return null;
    };

    let p1WinsResult = checkWin(c1, c2, &#39;p1&#39;, &#39;p2&#39;);
    let winner = p1WinsResult === true ? &#39;p1&#39; : (p1WinsResult === false ? &#39;p2&#39; : null);
    
    if (winner) {
        const wCard = cardsOnTable[winner].data;
        const lCard = cardsOnTable[winner === &#39;p1&#39; ? &#39;p2&#39; : &#39;p1&#39;].data;
        if (wCard.type === &#39;falcon&#39; &amp;&amp; lCard.n === &#39;B&#39;) { huntingFalcons[winner] = true; showMessage(&quot;СОКОЛ ВЫШЕЛ НА ОХОТУ!&quot;); }
        else if (wCard.type === &#39;falcon&#39; &amp;&amp; huntingFalcons[winner] &amp;&amp; lCard.n === &#39;K&#39;) { huntingFalcons[winner] = false; showMessage(&quot;СОКОЛ СЫТ&quot;); }
        if (c1.type === &#39;falcon&#39; &amp;&amp; winner === &#39;p2&#39;) huntingFalcons.p1 = false;
        if (c2.type === &#39;falcon&#39; &amp;&amp; winner === &#39;p1&#39;) huntingFalcons.p2 = false;
        const targetY = winner === &#39;p1&#39; ? 1200 : -1200;
        let collect = [...pot, cardsOnTable.p1, cardsOnTable.p2, ...snakesAside];
        collect.forEach(p =&gt; {
            p.el.style.transform = `translate(-50%, ${targetY}px) rotate(${Math.random()*40-20}deg)`;
            p.el.style.opacity = &quot;0&quot;;
            decks[winner].push(p.data);
        });
        finalizeRound(collect);
    } else {
        showMessage(&quot;СПОР!&quot;);
        pot.push(cardsOnTable.p1, cardsOnTable.p2, ...snakesAside);
        cardsOnTable = { p1: null, p2: null };
        snakesAside = [];
        isProcessing = false;
        if (isAuto) setTimeout(() =&gt; playCard(&#39;p1&#39;), 600);
    }
}

function finalizeRound(toRemove) {
    setTimeout(() =&gt; {
        toRemove.forEach(p =&gt; p.el.remove());
        pot = []; snakesAside = [];
        cardsOnTable = { p1: null, p2: null };
        isProcessing = false; zIdx = 20; updateStats();
        checkGameOver();
        if (!isGameOver() &amp;&amp; isAuto) playCard(&#39;p1&#39;);
    }, 600);
}

function isGameOver() { return decks.p1.length === 0 || decks.p2.length === 0; }
function checkGameOver() {
    if (decks.p1.length === 0) { showMessage(&quot;ВЫ ПРОИГРАЛИ...&quot;, true); setTimeout(() =&gt; location.reload(), 3000); }
    else if (decks.p2.length === 0) { showMessage(&quot;ВЫ ПОБЕДИТЕЛЬ!&quot;, true); setTimeout(() =&gt; location.reload(), 3000); }
}

document.getElementById(&#39;p1-btn&#39;).onclick = () =&gt; playCard(&#39;p1&#39;);
document.getElementById(&#39;p2-btn&#39;).onclick = () =&gt; playCard(&#39;p2&#39;);
document.getElementById(&#39;auto-btn&#39;).onclick = function() {
    isAuto = !isAuto; this.innerText = `АВТО: ${isAuto ? &#39;ВКЛ&#39; : &#39;ВЫКЛ&#39;}`;
    if (isAuto &amp;&amp; !isProcessing) playCard(&#39;p1&#39;);
};
init();

</script>
</body>
</html>
